# Fluent Bit — microk8s log collector
# Collects pdns logs and forwards to Loki with zone labels
# Chart: fluent/fluent-bit

fluent-bit:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  # RBAC required to read pod metadata
  rbac:
    create: true
    nodeAccess: true

  serviceAccount:
    create: true

  # DaemonSet — runs on every node
  kind: DaemonSet

  config:
    # ── Service ──────────────────────────────────────────────────────────────
    service: |
      [SERVICE]
          Flush         5
          Daemon        Off
          Log_Level     info
          Parsers_File  parsers.conf
          Parsers_File  custom_parsers.conf
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020

    # ── Input — tail pdns container logs ─────────────────────────────────────
    inputs: |
      [INPUT]
          Name              tail
          Tag               pdns.*
          Path              /var/log/containers/pdns*.log
          Parser            cri
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          Refresh_Interval  10

      [INPUT]
          Name              tail
          Tag               relay.*
          Path              /var/log/containers/relay-*_postfix-*.log
          Parser            cri
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          Refresh_Interval  10

      [INPUT]
          Name              tail
          Tag               opendkim.*
          Path              /var/log/containers/relay-*_opendkim-*.log
          Parser            cri
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          Refresh_Interval  10

      [INPUT]
          Name              tail
          Tag               ingress.*
          Path              /var/log/containers/nginx-ingress-*.log
          Parser            cri
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          Refresh_Interval  10

    # ── Filters ──────────────────────────────────────────────────────────────
    filters: |
      [FILTER]
          Name                kubernetes
          Match               pdns.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off

      [FILTER]
          Name              lua
          Match             pdns.*
          script            /fluent-bit/scripts/extract_zone.lua
          call              extract_zone

      [FILTER]
          Name                kubernetes
          Match               relay.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off

      [FILTER]
          Name              lua
          Match             relay.*
          script            /fluent-bit/scripts/extract_postfix.lua
          call              extract_postfix

      [FILTER]
          Name                kubernetes
          Match               opendkim.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off

      [FILTER]
          Name                kubernetes
          Match               ingress.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off

      # nginx-ingress emits JSON access logs (see
      # k8s_web/helm/templates/job-nginx-cf-logformat.yaml). In FB 5.x
      # the CRI parser writes stdout into 'message' (not 'log'), so
      # kubernetes Merge_Log doesn't see it. Parse 'message' explicitly
      # here to hoist status/path/method/remote_addr/… to the record
      # root — required for Label_Keys \$status and for LogQL '| json'.
      [FILTER]
          Name         parser
          Match        ingress.*
          Key_Name     message
          Parser       nginx_json
          Reserve_Data On

    # ── Outputs — Loki ───────────────────────────────────────────────────────
    outputs: |
      [OUTPUT]
          Name                   loki
          Match                  pdns.*
          Host                   loki.monitoring.svc.cluster.local
          Port                   3100
          Labels                 job=pdns, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']
          Label_Keys             $zone
          Auto_Kubernetes_Labels off
          Line_Format            json
          Remove_Keys            kubernetes, logtag

      [OUTPUT]
          Name                   loki
          Match                  relay.*
          Host                   loki.monitoring.svc.cluster.local
          Port                   3100
          Labels                 job=relay, namespace=$kubernetes['namespace_name'], container=$kubernetes['container_name']
          Label_Keys             $status
          Auto_Kubernetes_Labels off
          Line_Format            json
          Remove_Keys            kubernetes, logtag

      [OUTPUT]
          Name                   loki
          Match                  opendkim.*
          Host                   loki.monitoring.svc.cluster.local
          Port                   3100
          Labels                 job=opendkim, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']
          Auto_Kubernetes_Labels off
          Line_Format            json
          Remove_Keys            kubernetes, logtag

      [OUTPUT]
          Name                   loki
          Match                  ingress.*
          Host                   loki.monitoring.svc.cluster.local
          Port                   3100
          Labels                 job=ingress, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']
          Label_Keys             $status
          Auto_Kubernetes_Labels off
          Line_Format            json
          Remove_Keys            kubernetes, logtag

    # ── Custom parsers ────────────────────────────────────────────────────────
    customParsers: |
      [PARSER]
          Name        pdns_log
          Format      regex
          Regex       ^(?<time>[A-Za-z]+ \d+ \d+:\d+:\d+) (?<host>\S+) (?<process>\S+): (?<message>.*)$
          Time_Key    time
          Time_Format %b %d %H:%M:%S

      [PARSER]
          Name        nginx_json
          Format      json
          Time_Key    time
          Time_Format %Y-%m-%dT%H:%M:%S%z

  # Lua scripts
  luaScripts:
    extract_zone.lua: |
      function extract_zone(tag, timestamp, record)
          local log = record["log"] or record["message"] or ""
          -- Match both "zone 'foo'" and "zone: 'foo'" formats
          local zone = string.match(log, "zone:? '([^']+)'")
          if zone then
              -- Remove trailing dot from zone name
              zone = zone:gsub("%.$", "")
              record["zone"] = zone
          else
              record["zone"] = "unknown"
          end
          return 1, timestamp, record
      end

    extract_postfix.lua: |
      function extract_postfix(tag, timestamp, record)
          local log = record["log"] or record["message"] or ""

          local process = string.match(log, "postfix/([^%[]+)%[")
          if process then record["postfix_process"] = process end

          local queue_id = string.match(log, "postfix/[^:]+%[%d+%]: ([A-F0-9]+): ")
          if queue_id then record["queue_id"] = queue_id end

          local status = string.match(log, "status=(%w+)")
          record["status"] = status or "unknown"

          local to = string.match(log, "to=<([^>]+)>")
          if to then record["to"] = to end

          local from = string.match(log, "from=<([^>]*)>")
          if from then record["from"] = from end

          return 1, timestamp, record
      end

  # Mount host log directory
  volumeMounts:
    - name: varlog
      mountPath: /var/log

  volumes:
    - name: varlog
      hostPath:
        path: /var/log
